<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title> 
    <style>
        body {
            background-color: #F4F4F4; /* Cor de fundo para dar contraste com o blog */
            margin: 0;
            font-family: sans-serif;
        }

        header {
            background-color: #183C63;
            color: #FFFFFF;
            max-width: 800px;
            margin: 0 auto; /* CORRIGIDO: Era "margin-top: 0 auto", o que impedia a centralização */
            padding: 16px;
            text-align: center;
        }

        main {
            background-color: #FFFFFF;
            border: 5px solid #FFFFFF;
            max-width: 800px;
            margin: 0 auto;
            color: #183C63;
            text-align: center;
            padding: 20px; /* Adicionado para o texto não colar nas bordas */
        }

        img {
            width: 120px; /* Ajustado para o texto da imagem ficar um pouco mais legível */
            height: auto; /* CORRIGIDO: Mantém a proporção da imagem sem distorcer */
        }
    </style>
</head>
<body> 
    <header>
        <h1>Meu blog tech</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação</p>
    </header>
    <main>
        <img src="imagem.png" alt="Ícone quadrado para blog de tecnologia e educação com fundo em tons de azul e laranja. No centro, há a ilustração de um livro aberto integrado a circuitos eletrônicos e um chapéu de formatura estilizado com luz neon azul. Ao redor, pequenos ícones de computadores, engrenagens e códigos. Na parte inferior, está o texto 'TECH & EDUCANTE INOVAÇÃO NO ENSINO'">
        
        <h2>Meu primeiro post</h2>
        <p><strong>Por: Marcelo Peludetto</strong></p>
        <p>Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação e curiosidades da área da tecnologia.</p>
    </main>
</body>
</html>
